<!DOCTYPE html>
<html ng-app="Materialadmin">
<head>
    <meta charset="UTF-8">
    <title>Teste</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<h1 ng-controller="loginController" class="topbar">{{nome.empresa}}</h1>
<h1>aaaaaaaaaaaaaaaaaaaaaaaaaaaaaa</h1>
<form>
    <div ng-controller="trabalhoHoje">
    <h1>{{nome.trabalho}}</h1>
</div>
</form>
<div ng-controller="descricao">
    <h1>
        descriptions:
        {{descricao.app}}
    </h1>
</div>

<div ng-controller="!controle.usuario">

    <input type="text" ng-model="usuario" placeholder="usuario aq">

    <input type="password" ng-model="senha" placeholder="senha aq">

    <p>usuario {{controle.usuario}}</p>
    <p>senha {{controle.senha}}</p>

</div>

<div ng-if="!controle.usuario">
    <p>usuario {{controle.usuario}}</p>
    <p>senha {{controle.senha}}</p>
</div>

<script src="bower_components/angular/angular.min.js"></script>
<script src="dist/js/app.js"></script>

</body>
</html>
